<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Results — InterviewAI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#1a1d23;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e2e4ea;padding:0 2rem;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.logo{font-size:1.1rem;font-weight:800;color:#4f46e5}
.logo span{color:#1a1d23;font-weight:400}
.header-nav{display:flex;gap:8px}
.btn-nav{padding:7px 15px;border-radius:8px;border:1px solid #e2e4ea;background:transparent;font-size:13px;color:#6b7280;cursor:pointer;text-decoration:none;font-family:inherit}
.btn-nav:hover{background:#f5f6fa}
.container{max-width:860px;margin:0 auto;padding:2rem 1.5rem}
.page-header{margin-bottom:1.5rem}
.page-title{font-size:20px;font-weight:700}
.page-sub{font-size:13px;color:#6b7280;margin-top:4px}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.btn-action{padding:8px 16px;border-radius:8px;border:1px solid #e2e4ea;background:#fff;font-size:13px;cursor:pointer;color:#1a1d23;font-family:inherit}
.btn-action:hover{background:#f5f6fa}
.q-card{background:#fff;border:1px solid #e2e4ea;border-radius:10px;padding:1.15rem 1.3rem;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.q-meta{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em}
.b-technical{background:#dbeafe;color:#1d4ed8}
.b-behavioral{background:#d1fae5;color:#059669}
.b-situational{background:#fef3c7;color:#b45309}
.b-easy{background:#f0fdf4;color:#166534}
.b-medium{background:#fffbeb;color:#92400e}
.b-hard{background:#fef2f2;color:#991b1b}
.q-text{font-size:14px;line-height:1.65;font-weight:500;margin-bottom:10px}
.hint-btn{padding:6px 12px;border-radius:6px;border:none;background:#ede9fe;color:#4f46e5;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.hint-btn:hover{background:#ddd6fe}
.hint-box{margin-top:10px;padding:10px 14px;background:#ede9fe;border-left:3px solid #4f46e5;border-radius:6px;font-size:13px;color:#3730a3;line-height:1.6;display:none}
</style>
</head>
<body>

<header>
  <div class="logo">My Interview<span>AI</span></div>
  <div class="header-nav">
    <a href="/history" class="btn-nav">← History</a>
    <a href="/" class="btn-nav">Home</a>
  </div>
</header>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">{{ job_title }}</h1>
    <p class="page-sub">{{ experience }} · {{ questions|length }} questions</p>
  </div>

  <div class="action-bar">
    <a href="/export/{{ session_id }}" class="btn-action">Download .txt</a>
    <a href="/" class="btn-action">Generate new</a>
  </div>

  {% for q in questions %}
  <div class="q-card">
    <div class="q-meta">
      <span class="badge b-{{ q.category }}">{{ q.category }}</span>
      <span class="badge b-{{ q.difficulty }}">{{ q.difficulty }}</span>
    </div>
    <div class="q-text">{{ loop.index }}. {{ q.question }}</div>
    {% if q.hint %}
    <button class="hint-btn" onclick="toggleHint('h{{ loop.index }}', this)">Show hint 💡</button>
    <div class="hint-box" id="h{{ loop.index }}">{{ q.hint }}</div>
    {% endif %}
  </div>
  {% endfor %}
</div>

<script>
function toggleHint(id, btn) {
  const el = document.getElementById(id);
  const open = el.style.display === 'block';
  el.style.display = open ? 'none' : 'block';
  btn.textContent  = open ? 'Show hint 💡' : 'Hide hint';
}
</script>
</body>
</html>
